<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
</head>
<body>
<h2>All Users</h2>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Email</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.email}"></td>
    </tr>
    </tbody>
</table>
<a href="/logout">Logout</a>
</body>
</html>
